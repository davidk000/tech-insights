.region-label{font-size:10px;fill:#fff;text-anchor:middle;pointer-events:none;font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,.8)}

.tooltip-row{display:flex;justify-content:space-between;margin:4px 0;color:var(--text-dim)}

.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--panel)}

.timeline-track{position:relative;height:48px;display:flex;align-items:center}
.timeline-bar{position:absolute;left:0;right:0;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.timeline-progress{height:100%;background:linear-gradient(90deg,#58a6ff,#7eb8da);border-radius:3px;transition:width .1s}
.timeline-input{position:absolute;left:0;right:0;width:100%;height:48px;opacity:0;cursor:pointer;-webkit-appearance:none}

// ============ STATE ============
let currentYear = 304;
let isPlaying = false;
let playInterval = null;
let playSpeed = 1;
let activeFilters = new Set(Object.keys(DYNASTIES));
let currentTab = '16';

// ============ DOM ============
const svg = document.getElementById('map');
const tooltip = document.getElementById('tooltip');
const timelineInput = document.getElementById('timelineInput');
const timelineProgress = document.getElementById('timelineProgress');
const timelineThumb = document.getElementById('timelineThumb');
const currentYearEl = document.getElementById('currentYear');
const currentEraEl = document.getElementById('currentEra');
const mainRulersEl = document.getElementById('mainRulers');
const dynastyEventsEl = document.getElementById('dynastyEvents');
const yanRulersEl = document.getElementById('yanRulers');
const yanTreeEl = document.getElementById('yanTree');
const infoPanel = document.getElementById('infoPanel');
const collapseBtn = document.getElementById('collapseBtn');
const legend = document.getElementById('legend');
const tabBtn16 = document.getElementById('tabBtn16');
const tabBtn5 = document.getElementById('tabBtn5');

// ============ RENDER ============
function renderLegend() {
  legend.innerHTML = Object.keys(DYNASTIES).map(id => {
    const d = DYNASTIES[id];
    const isActive = activeFilters.has(id);
    return '<div class="legend-item '+(isActive?'':'inactive')+'" data-id="'+id+'" onclick="toggleDynasty(\''+id+'\')">'+
      '<div class="legend-dot" style="background:'+d.color+'"></div><span>'+d.name+'</span></div>';
  }).join('');
}

function toggleDynasty(id) {
  if (activeFilters.has(id)) activeFilters.delete(id);
  else activeFilters.add(id);
  renderLegend();
  renderMap();
  updateRulers();
  updateRegionOpacity();
}

function switchTab(tab) {
  currentTab = tab;
  tabBtn16.classList.toggle('active', tab === '16');
  tabBtn5.classList.toggle('active', tab === '5');
  document.getElementById('tab16').style.display = tab === '16' ? '' : 'none';
  document.getElementById('tab5').style.display = tab === '5' ? '' : 'none';
  if (tab === '5') renderYanRulers();
  else updateRulers();
}

tabBtn16.addEventListener('click', () => switchTab('16'));
tabBtn5.addEventListener('click', () => switchTab('5'));

function renderMap() {
  svg.innerHTML = '';
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width','100%'); bg.setAttribute('height','100%'); bg.setAttribute('fill','#1a1f26');
  svg.appendChild(bg);
  
  const grid = document.createElementNS('http://www.w3.org/2000/svg','g');
  grid.setAttribute('stroke','#252b33'); grid.setAttribute('stroke-width','0.5');
  for(let i=0;i<800;i+=40){
    const v=document.createElementNS('http://www.w3.org/2000/svg','line');
    v.setAttribute('x1',i);v.setAttribute('y1',0);v.setAttribute('x2',i);v.setAttribute('y2',600);
    grid.appendChild(v);
  }
  for(let i=0;i<600;i+=40){
    const h=document.createElementNS('http://www.w3.org/2000/svg','line');
    h.setAttribute('x1',0);h.setAttribute('y1',i);h.setAttribute('x2',800);h.setAttribute('y2',i);
    grid.appendChild(h);
  }
  svg.appendChild(grid);
  
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  Object.entries(REGIONS).forEach(([id, data]) => {
    const d = DYNASTIES[id];
    if (!d) return;
    const isActive = currentYear >= d.start && currentYear <= d.end;
    const isFiltered = activeFilters.has(id);
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', data.path);
    path.setAttribute('fill', d.color);
    path.setAttribute('stroke','#fff');
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('stroke-opacity','0.3');
    path.setAttribute('class', 'region '+(isActive && isFiltered ? '' : 'inactive'));
    path.setAttribute('data-id', id);
    path.style.opacity = isActive && isFiltered ? '0.7' : '0.1';
    path.style.transition = 'opacity 0.5s, filter 0.3s';
    path.addEventListener('mouseenter', e => showTooltip(e, id));
    path.addEventListener('mousemove', e => moveTooltip(e));
    path.addEventListener('mouseleave', () => hideTooltip());
    path.addEventListener('click', () => scrollToDynasty(id));
    g.appendChild(path);
    
    if (isActive && isFiltered) {
      const c = getCentroid(data.path);
      const label = document.createElementNS('http://www.w3.org/2000/svg','text');
      label.setAttribute('class','region-label');
      label.setAttribute('x',c.x); label.setAttribute('y',c.y);
      label.textContent = d.name;
      label.style.opacity='0'; label.style.transition='opacity 0.5s 0.3s';
      g.appendChild(label);
      requestAnimationFrame(() => label.style.opacity='1');
    }
  });
  svg.appendChild(g);
  
  const title = document.createElementNS('http://www.w3.org/2000/svg','text');
  title.setAttribute('x','20'); title.setAttribute('y','35');
  title.setAttribute('fill','#8b949e'); title.setAttribute('font-size','12');
  title.textContent = '十六国时期疆域变迁示意';
  svg.appendChild(title);
}

function getCentroid(pathD) {
  const nums = pathD.match(/\d+/g).map(Number);
  let sx=0,sy=0;
  for(let i=0;i<nums.length;i+=2){sx+=nums[i];sy+=nums[i+1];}
  return {x:sx/(nums.length/2),y:sy/(nums.length/2)};
}

function showTooltip(e, id) {
  const d = DYNASTIES[id];
  if (!d) return;
  const isActive = currentYear >= d.start && currentYear <= d.end;
  const ruler = isActive ? getCurrentRuler(d, currentYear) : null;
  tooltip.innerHTML = '<h3><span class="dynasty-name" style="background:'+d.color+'">'+d.name+'</span></h3>'+
    (isActive ?
    '<div class="tooltip-row"><span>存续</span><span>'+d.start+'-'+d.end+'</span></div>'+
    '<div class="tooltip-row"><span>统治</span><span>'+d.territory+'</span></div>'+
    '<div class="tooltip-row"><span>民族</span><span>'+d.ethnic+'</span></div>'+
    '<div class="tooltip-row"><span>亡于</span><span>'+d.collapsed+'</span></div>'+
    (ruler?'<div class="tooltip-row"><span>在位</span><span>'+ruler.name+' ('+ruler.reign+')</span></div>':'') :
    '<div class="tooltip-row"><span>状态</span><span>'+(currentYear<d.start?'尚未建立':'已灭亡')+'</span></div>');
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  tooltip.style.left = (e.clientX+15)+'px';
  tooltip.style.top = (e.clientY+15)+'px';
}

function hideTooltip() { tooltip.classList.remove('visible'); }

function getCurrentRuler(d, year) {
  return d.founders.find(r => {
    const [s, e] = r.reign.split('-');
    return year >= parseInt(s) && year <= (e ? parseInt(e) : year);
  });
}

function scrollToDynasty(id) {
  const d = DYNASTIES[id];
  if (!d) return;
  if (currentYear < d.start || currentYear > d.end) { setYear(d.start); timelineInput.value = d.start; }
  if (infoPanel.classList.contains('collapsed')) { infoPanel.classList.remove('collapsed'); collapseBtn.textContent = '‹'; }
  if (currentTab !== '16') switchTab('16');
  mainRulersEl.scrollIntoView({behavior:'smooth',block:'start'});
}

function updateRulers() {
  const active = Object.entries(DYNASTIES).filter(([id, d]) => currentYear >= d.start && currentYear <= d.end);
  mainRulersEl.innerHTML = active.map(([id, d]) => {
    const ruler = getCurrentRuler(d, currentYear);
    return '<div class="ruler-item active" data-id="'+id+'">'+
      '<div class="ruler-avatar" style="background:'+d.color+'20;color:'+d.color+';border:2px solid '+d.color+'">'+(ruler?ruler.name[0]:'?')+'</div>'+
      '<div class="ruler-info"><div class="ruler-name" style="color:'+d.color+'">'+d.name+'</div>'+
      '<div class="ruler-reign">'+(ruler?ruler.name+' · '+ruler.reign : d.start+'-'+d.end)+'</div></div></div>';
  }).join('');
  mainRulersEl.querySelectorAll('.ruler-item').forEach(el => {
    el.addEventListener('click', () => scrollToDynasty(el.dataset.id));
  });
}

function renderYanRulers() {
  yanRulersEl.innerHTML = Object.entries(FIVE_YAN).map(([id, d]) => {
    const isActive = currentYear >= d.start && currentYear <= d.end;
    const c = d.color || '#888';
    return '<div class="ruler-item '+(isActive?'active':'')+'">'+
      '<div class="ruler-avatar" style="background:'+c+'20;color:'+c+';border:2px solid '+c+'">燕</div>'+
      '<div class="ruler-info"><div class="ruler-name">'+d.name+' <span style="font-size:11px;color:var(--text-dim)">('+d.start+'-'+d.end+')</span></div>'+
      '<div class="ruler-reign" style="color:'+(isActive?'var(--text)':'var(--text-dim)')+'">'+d.note.split('。')[0]+'</div></div></div>';
  }).join('');
  
  yanTreeEl.innerHTML = '<div style="font-size:12px;color:var(--text-dim);line-height:1.9">'+
    '<div style="color:#2ecc71">前燕 (337-370)</div>'+
    '<div style="padding-left:16px;color:#228b22">├ 西燕 (384-394) ← 慕容泓，394年灭于后燕</div>'+
    '<div style="padding-left:16px;color:#27ae60">├ 后燕 (384-407) ← 慕容垂</div>'+
    '<div style="padding-left:32px;color:#1a5e20">│ └ 北燕 (407-436) ← 冯跋(汉) 409年篡权</div>'+
    '<div style="padding-left:32px;color:#006400">│ └ 南燕 (398-410) ← 慕容德南迁</div>'+
    '<div style="margin-top:10px;font-size:11px;color:#8b949e;padding:8px;background:rgba(255,255,255,.03);border-radius:6px">注：西燕部分史家不列入十六国正统<br>五燕均出自鲜卑慕容氏，前燕→西燕+后燕→南燕+北燕</div></div>';
}

function updateRegionOpacity() {
  document.querySelectorAll('.region').forEach(path => {
    const id = path.getAttribute('data-id');
    const d = DYNASTIES[id];
    if (!d) return;
    const isActive = currentYear >= d.start && currentYear <= d.end;
    const isFiltered = activeFilters.has(id);
    path.classList.toggle('inactive', !isActive || !isFiltered);
    path.style.opacity = isActive && isFiltered ? '0.7' : '0.1';
  });
}

function updateEvents() {
  const yearEvents = EVENTS.filter(e => e.year === currentYear);
  if (yearEvents.length > 0) {
    dynastyEventsEl.innerHTML = yearEvents.map(e =>
      '<div class="event-item"><span class="event-year">'+e.year+'</span><span class="event-desc">'+e.text+'</span></div>'
    ).join('');
  } else {
    const upcoming = EVENTS.filter(e => e.year > currentYear).slice(0,3);
    dynastyEventsEl.innerHTML = upcoming.map(e =>
      '<div class="event-item" style="opacity:0.5"><span class="event-year">'+e.year+'</span><span class="event-desc">'+e.text+'</span></div>'
    ).join('');
    if (!upcoming.length) dynastyEventsEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px">十六国时期结束，北魏统一北方</div>';
  }
}

function updateEraLabel() {
  const active = Object.entries(DYNASTIES).filter(([id, d]) => currentYear >= d.start && currentYear <= d.end);
  const yearEvents = EVENTS.filter(e => e.year === currentYear);
  if (yearEvents.length) currentEraEl.textContent = yearEvents[0].text.slice(0,18);
  else if (active.length) currentEraEl.textContent = active.length+'个政权并存';
}

function setYear(year) {
  currentYear = parseInt(year);
  currentYearEl.textContent = currentYear;
  const progress = ((currentYear - 304) / (439 - 304)) * 100;
  timelineProgress.style.width = progress+'%';
  timelineThumb.style.left = progress+'%';
  updateEraLabel();
  if (currentTab === '16') updateRulers();
  else renderYanRulers();
  updateRegionOpacity();
  updateEvents();
}

// ============ PLAYBACK ============
function play() {
  if (isPlaying) { pause(); return; }
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ 暂停';
  document.body.classList.add('playing');
  playInterval = setInterval(() => {
    if (currentYear >= 439) { pause(); setYear(304); return; }
    setYear(currentYear + 1);
    timelineInput.value = currentYear;
  }, 1000 / playSpeed);
}

function pause() {
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶ 播放';
  document.body.classList.remove('playing');
  if (playInterval) { clearInterval(playInterval); playInterval = null; }
}

// ============ EVENTS ============
document.getElementById('playBtn').addEventListener('click', play);
document.getElementById('prevBtn').addEventListener('click', () => { if(currentYear > 304) setYear(currentYear-1); timelineInput.value = currentYear; });
document.getElementById('nextBtn').addEventListener('click', () => { if(currentYear < 439) setYear(currentYear+1); timelineInput.value = currentYear; });
document.getElementById('resetBtn').addEventListener('click', () => { pause(); setYear(304); timelineInput.value = 304; });
timelineInput.addEventListener('input', e => setYear(e.target.value));
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    playSpeed = parseFloat(btn.dataset.speed);
    if (isPlaying) { pause(); play(); }
  });
});
collapseBtn.addEventListener('click', () => {
  infoPanel.classList.toggle('collapsed');
  collapseBtn.textContent = infoPanel.classList.contains('collapsed') ? '‹' : '›';
});
document.addEventListener('keydown', e => {
  switch(e.key) {
    case ' ': e.preventDefault(); play(); break;
    case 'ArrowLeft': if(currentYear>304) setYear(currentYear-1); timelineInput.value=currentYear; break;
    case 'ArrowRight': if(currentYear<439) setYear(currentYear+1); timelineInput.value=currentYear; break;
    case 'Home': setYear(304); timelineInput.value=304; break;
    case 'End': setYear(439); timelineInput.value=439; break;
  }
});

// ============ INIT ============
renderLegend();
renderMap();
setYear(304);

// Entrance animation
setTimeout(() => {
  document.querySelectorAll('.region').forEach((el, i) => {
    el.style.opacity = el.classList.contains('inactive') ? '0.1' : '0.7';
  });
}, 100);
</script>
</body>
</html>
