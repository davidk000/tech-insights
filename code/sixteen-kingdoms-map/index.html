x=\"50\" y=\"200\">塞北</text></g><text x=\"760\" y=\"688\" font-size=\"7\" fill=\"#8a7060\" opacity=\"0.5\" font-family=\"serif\">十六国疆域图 (304-439)</text></svg>";

var curY=304,isPl=false,plI=null,spd=1,curT='16';
var aF=new Set();
var NS='http://www.w3.org/2000/svg';
var mEl,svgEl,ttEl,cyEl,ceEl,mrEl,devEl,yrEl,ytEl,ipEl,cbtnEl,legEl,tiEl,tpEl,thEl;
function init(){
  aF=new Set(Object.keys(DY));
  mEl=document.getElementById('map');
  ttEl=document.getElementById('tt');cyEl=document.getElementById('cy');ceEl=document.getElementById('ce');
  mrEl=document.getElementById('mr');devEl=document.getElementById('dev');yrEl=document.getElementById('yr');
  ytEl=document.getElementById('yt');ipEl=document.getElementById('ip');cbtnEl=document.getElementById('cbtn');
  legEl=document.getElementById('leg');tiEl=document.getElementById('ti');tpEl=document.getElementById('tp');
  thEl=document.getElementById('th');
  svgEl=mEl.querySelector('svg');
  renderMap();renderLeg();updateAll();
}
function mkEl(tag,attrs,parent){
  var e=document.createElementNS(NS,tag);
  if(attrs)for(var k in attrs)e.setAttribute(k,attrs[k]);
  if(parent)parent.appendChild(e);return e;
}
function yx(yr,start,end,w){return Math.round((yr-start)/(end-start)*w);}
function renderMap(){
  var bg=document.createElementNS(NS,'g');
  bg.setAttribute('id','bg');
  svgEl.appendChild(bg);
  var dp=new DOMParser();
  var doc=dp.parseFromString(ANCIENT,'image/svg+xml');
  var nodes=doc.documentElement.childNodes;
  for(var i=0;i<nodes.length;i++){
    try{var n=document.importNode(nodes[i],true);if(n.tagName)svgEl.insertBefore(n,bg);}catch(e){}
  }
  renderRgns();
}
function renderRgns(){
  var g=mkEl('g',{id:'rgns'},svgEl);
  Object.keys(DY).forEach(function(id){
    var d=DY[id],r=RG[id];
    if(!r)return;
    var act=curY>=d.s&&curY<=d.e;
    var inactive=aF.has(id)?'':'_inactive';
    var p=mkEl('rect',{x:r.x,y:r.y,w:r.w,h:r.h,fill:d.c,stroke:'#fff','stroke-width':1.5,'stroke-opacity':0.2,class:'sr'+inactive,opacity:act?0.4:0,'data-id':id},g);
    p.addEventListener('mouseenter',function(e){showTT(e,id);});
    p.addEventListener('mousemove',function(e){ttEl.style.left=(e.clientX+12)+'px';ttEl.style.top=(e.clientY+12)+'px';});
    p.addEventListener('mouseleave',function(){ttEl.classList.remove('v');});
    p.addEventListener('click',function(){jumpTo(id);});
    if(act&&aF.has(id)){
      var l=mkEl('text',{x:r.x+r.w/2,y:r.y+12,'text-anchor':'middle','font-size':10,fill:'#3a2810','font-weight':600,'pointer-events':'none'},g);
      l.textContent=d.nm;
    }
  });
  renderBars();
}
function renderBars(){
  var bG=svgEl.querySelector('#bars');
  if(bG)bG.remove();
  bG=mkEl('g',{id:'bars'},svgEl);
  Object.entries(DY).forEach(function(e){
    var id=e[0],d=e[1],r=RG[id];
    if(!r||!d.rs)return;
    if(curY<d.s||curY>d.e||!aF.has(id))return;
    var by=r.y+r.h-18,bh=14;
    mkEl('rect',{x:r.x,y:by,w:r.w,h:bh,rx:2,fill:'rgba(0,0,0,0.3)',stroke:'rgba(255,255,255,0.1)'},bG);
    d.rs.forEach(function(r2){
      var ps=r2.r.split('-');
      var s2=parseInt(ps[0]);
      var e2=ps[1]?parseInt(ps[1]):d.e;
      var x1=yx(s2,d.s,d.e,r.w);
      var x2=yx(Math.min(e2,d.e),d.s,d.e,r.w);
      var rw=Math.max(1,x2-x1);
      mkEl('rect',{x:r.x+x1,y:by,w:rw,h:bh,rx:1,fill:d.c,opacity:0.85},bG);
    });
    var cx2=yx(Math.min(curY,d.e),d.s,d.e,r.w);
    mkEl('line',{x1:r.x+cx2,x2:r.x+cx2,y1:by-2,y2:by+bh+2,stroke:'#c0392b','stroke-width':2},bG);
    var t=mkEl('text',{x:r.x+2,y:by-3,'font-size':7,fill:'rgba(255,255,255,0.7)','pointer-events':'none'},bG);
    t.textContent=d.nm;
  });
}
function renderRgnOp(){
  svgEl.querySelectorAll('.sr').forEach(function(p){
    var id=p.getAttribute('data-id'),d=DY[id];
    if(!d)return;
    var act=curY>=d.s&&curY<=d.e&&aF.has(id);
    p.setAttribute('class','sr'+(act?'':'_inactive'));
    p.setAttribute('opacity',act?'0.4':'0');
  });
}
function getCur(d,year){
  return d.rs.find(function(r){
    var ps=r.r.split('-');
    var s=parseInt(ps[0]);
    var e2=ps[1]?parseInt(ps[1]):year;
    return year>=s&&year<=e2;
  });
}
function yrRow(r,d){
  var ps=r.r.split('-');
  var dur=ps[1]?(parseInt(ps[1])-parseInt(ps[0]))+'年':'';
  return '<div class=rr><div class=rs style="background:'+d.c+'"></div><span class=rn>'+r.n+'</span><span class=ry>'+r.r+(dur?' ('+dur+')':'')+'</span></div>';
}
function showTT(e,id){
  var d=DY[id];
  if(!d)return;
  var act=curY>=d.s&&curY<=d.e;
  var rHtml=d.rs.map(function(r){return yrRow(r,d);}).join('');
  var info=act
    ?'<div class=rw><span>存續</span><span>'+d.s+'-'+d.e+'</span></div><div class=rw><span>統治</span><span>'+d.t+'</span></div><div class=rw><span>民族</span><span>'+d.et+'</span></div><div class=rw><span>亡於</span><span>'+d.co+'</span></div><div class=rh>'+rHtml+'</div>'
    :'<div class=rw><span>狀態</span><span>'+(curY<d.s?'尚未建立':'已滅亡')+'</span></div>';
  ttEl.innerHTML='<h3><span class=dn style="background:'+d.c+'">'+d.nm+'</span></h3>'+info;
  ttEl.classList.add('v');
  ttEl.style.left=(e.clientX+12)+'px';
  ttEl.style.top=(e.clientY+12)+'px';
}
function jumpTo(id){
  var d=DY[id];
  if(!d)return;
  if(curY<d.s||curY>d.e){setY(d.s);tiEl.value=d.s;}
  if(curT!=='16')swT('16');
  if(ipEl.classList.contains('collapsed')){ipEl.classList.remove('collapsed');cbtnEl.textContent='<';}
  mrEl.scrollIntoView({behavior:'smooth',block:'start'});
}
function updateRulers(){
  var active=Object.entries(DY).filter(function(e){return curY>=e[1].s&&curY<=e[1].e;});
  mrEl.innerHTML='';
  active.forEach(function(e){
    var id=e[0],d=e[1];
    var r2=getCur(d,curY);
    var div=document.createElement('div');
    div.className='ruler-item';
    div.innerHTML='<div class="ra" style="background:'+d.c+'22;color:'+d.c+'">'+d.nm[0]+'</div><div class=rf><div class=rn2 style="color:'+d.c+'">'+d.nm+'</div><div class=rd>'+(r2?r2.n+'·'+r2.r:d.s+'-'+d.e)+'</div></div>';
    div.addEventListener('click',function(){jumpTo(id);});
    mrEl.appendChild(div);
  });
}
function updateEvents(){
  var ye=EV.filter(function(e){return e.y===curY;});
  var upcoming=EV.filter(function(e){return e.y>curY;}).slice(0,3);
  devEl.innerHTML='';
  if(ye.length>0){
    ye.forEach(function(e){
      var div=document.createElement('div');
      div.className='ev';
      div.innerHTML='<span class=ev-year>'+e.y+'</span><span class=ev-desc>'+e.t+'</span>';
      devEl.appendChild(div);
    });
  }else{
    upcoming.forEach(function(e){
      var div=document.createElement('div');
      div.className='ev';
      div.style.opacity='0.45';
      div.innerHTML='<span class=ev-year>'+e.y+'</span><span class=ev-desc>'+e.t+'</span>';
      devEl.appendChild(div);
    });
  }
}
function updateEraLabel(){
  var ye=EV.filter(function(e){return e.y===curY;});
  var count=Object.keys(DY).filter(function(id){var d=DY[id];return curY>=d.s&&curY<=d.e;}).length;
  ceEl.textContent=ye.length?ye[0].t.slice(0,16):(count>0?count+'個政權並存':'');
}
function updateLeg(){
  legEl.innerHTML='';
  Object.keys(DY).forEach(function(id){
    var d=DY[id];
    var div=document.createElement('div');
    div.className='legend-item'+(aF.has(id)?'':'_inactive');
    div.innerHTML='<div class=legend-dot style="background:'+d.c+'"></div><span>'+d.nm+'</span>';
    div.addEventListener('click',function(){togDyn(id);});
    legEl.appendChild(div);
  });
}
function togDyn(id){if(aF.has(id))aF.delete(id);else aF.add(id);updateLeg();renderRgnOp();renderBars();}
function swT(tab){
  curT=tab;
  document.getElementById('tb16').classList.toggle('active',tab==='16');
  document.getElementById('tb5').classList.toggle('active',tab==='5');
  var t16=document.getElementById('t16');
  var t5=document.getElementById('t5');
  t16.style.display=tab==='16'?'':'none';
  t5.style.display=tab==='5'?'':'none';
  if(tab==='5')renderYan();else updateRulers();
}
function renderYan(){
  yrEl.innerHTML='';
  Object.entries(YN).forEach(function(e){
    var id=e[0],d=e[1];
    var act=curY>=d.s&&curY<=d.e;
    var div=document.createElement('div');
    div.className='ruler-item'+(act?' active':'');
    div.innerHTML='<div class="ra" style="background:'+d.c+'22;color:'+d.c+'">燕</div><div class=rf><div class=rn2 style="color:'+d.c+'">'+d.nm+'<span style="font-size:10px;color:#8a7a58"> ('+d.s+'-'+d.e+')</span></div><div class=rd style="color:'+(act?'#e8d5a8':'#8a7a58')+'">'+d.nt.split('。')[0]+'</div></div>';
    yrEl.appendChild(div);
  });
  ytEl.innerHTML='<div style="color:#2ecc71">前燕 (337-370)</div><div style="padding-left:14px;color:#228b22">├ 西燕 (384-394) 慕容泓，394年滅於後燕</div><div style="padding-left:14px;color:#27ae60">├ 後燕 (384-407) 慕容垂</div><div style="padding-left:28px;color:#1a5e20">│ └ 北燕 (407-436) 馮跋(漢) 409年篡權</div><div style="padding-left:28px;color:#006400">│ └ 南燕 (398-410) 慕容德南遷</div><div style="margin-top:10px;font-size:10px;color:#8a7a58;padding:8px;background:rgba(255,255,255,.02);border-radius:6px">注：西燕部分史家不列入十六國正統</div>';
}
function setY(yr){
  curY=parseInt(yr);cyEl.textContent=curY;
  var pct=((curY-304)/135*100);
  tpEl.style.width=pct+'%';
  thEl.style.left='calc('+pct+'% - 7px)';
  updateEraLabel();
  if(curT==='16'){updateRulers();renderRgnOp();renderBars();}else renderYan();
  updateEvents();
}
function play(){
  if(isPl){isPl=false;clearInterval(plI);plI=null;document.getElementById('ply').textContent='▶';return;}
  isPl=true;
  document.getElementById('ply').textContent='⏸';
  plI=setInterval(function(){
    if(curY>=439){play();setY(304);tiEl.value=304;return;}
    setY(curY+1);tiEl.value=curY;
  },1000/spd);
}
document.getElementById('ply').addEventListener('click',play);
document.getElementById('prv').addEventListener('click',function(){if(curY>304)setY(curY-1);tiEl.value=curY;});
document.getElementById('nxt').addEventListener('click',function(){if(curY<439)setY(curY+1);tiEl.value=curY;});
document.getElementById('rst').addEventListener('click',function(){if(isPl)play();setY(304);tiEl.value=304;});
document.getElementById('ti').addEventListener('input',function(e){setY(e.target.value);});
document.getElementById('tb16').addEventListener('click',function(){swT('16');});
document.getElementById('tb5').addEventListener('click',function(){swT('5');});
cbtnEl.addEventListener('click',function(){ipEl.classList.toggle('collapsed');cbtnEl.textContent=ipEl.classList.contains('collapsed')?'»':'«';});
document.querySelectorAll('.speed-btn').forEach(function(b){b.addEventListener('click',function(){
  document.querySelectorAll('.speed-btn').forEach(function(x){x.classList.remove('active');});
  b.classList.add('active');
  spd=parseFloat(b.dataset.v);
  if(isPl){clearInterval(plI);plI=setInterval(function(){if(curY>=439){play();setY(304);tiEl.value=304;return;}setY(curY+1);tiEl.value=curY;},1000/spd);}
});});
document.addEventListener('keydown',function(e){
  if(e.key===' ')e.preventDefault(),play();
  else if(e.key==='ArrowLeft'&&curY>304)setY(curY-1),tiEl.value=curY;
  else if(e.key==='ArrowRight'&&curY<439)setY(curY+1),tiEl.value=curY;
  else if(e.key==='Home')setY(304),tiEl.value=curY;
  else if(e.key==='End')setY(439),tiEl.value=curY;
});
function updateAll(){updateLeg();updateRulers();updateEvents();updateEraLabel();renderBars();}
window.addEventListener('load',init);
</script>
