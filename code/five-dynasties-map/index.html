<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五代十国 · 疆域变迁互动地图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --font: "PingFang SC", "Microsoft YaHei", sans-serif;
    
    --liang: #e8b86d;
    --tang: #7eb8da;
    --jin: #c9a0dc;
    --han: #98d982;
    --zhou: #f0a070;
    --shu-qian: #ff6b6b;
    --shu-hou: #c44;
    --wu: #ffd93d;
    --tang-south: #ff9f43;
    --yue: #a29bfe;
    --min: #74b9ff;
    --chu: #55efc4;
    --nanhan: #fd79a8;
    --beihan: #636e72;
    --nanping: #b2bec3;
    --zhao: #dfe6e9;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    z-index: 100;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .dynasty-legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 11px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .legend-item:hover { background: rgba(255,255,255,0.08); }
  .legend-item.inactive { opacity: 0.3; }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  main {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  #map-container {
    flex: 1;
    position: relative;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  .region {
    cursor: pointer;
    transition: opacity 0.3s, transform 0.3s;
    transform-origin: center;
  }

  .region:hover { filter: brightness(1.2); }
  .region.inactive { opacity: 0.15; pointer-events: none; }

  .region-label {
    font-size: 11px;
    fill: #fff;
    text-anchor: middle;
    pointer-events: none;
    font-weight: 500;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  .tooltip {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    max-width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 1000;
    line-height: 1.6;
  }

  .tooltip.visible { opacity: 1; }

  .tooltip h3 {
    font-size: 15px;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tooltip .dynasty-name {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
  }

  .tooltip-row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
    color: var(--text-dim);
  }

  .tooltip-row span:last-child { color: var(--text); }

  .info-panel {
    width: 320px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 0;
    overflow-y: auto;
    transition: width 0.3s;
  }

  .info-panel.collapsed { width: 0; padding: 0; overflow: hidden; }

  .panel-section {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }

  .panel-section h2 {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .current-year {
    font-size: 42px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .current-era {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .ruler-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ruler-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.03);
    transition: background 0.2s;
    cursor: pointer;
  }

  .ruler-item:hover { background: rgba(255,255,255,0.08); }
  .ruler-item.active { background: rgba(255,255,255,0.12); }

  .ruler-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .ruler-info { flex: 1; min-width: 0; }
  .ruler-name { font-weight: 600; font-size: 14px; }
  .ruler-reign { font-size: 12px; color: var(--text-dim); }

  .timeline-controls {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }

  .year-markers {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
    padding: 0 2px;
  }

  .timeline-track {
    position: relative;
    height: 48px;
    display: flex;
    align-items: center;
  }

  .timeline-bar {
    position: absolute;
    left: 0;
    right: 0;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .timeline-progress {
    height: 100%;
    background: linear-gradient(90deg, #58a6ff, #7eb8da);
    border-radius: 3px;
    transition: width 0.1s;
  }

  .timeline-input {
    position: absolute;
    left: 0;
    right: 0;
    width: 100%;
    height: 48px;
    opacity: 0;
    cursor: pointer;
    -webkit-appearance: none;
  }

  .timeline-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 18px;
    height: 18px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    pointer-events: none;
    transition: left 0.1s;
  }

  .tick-marks {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
    pointer-events: none;
  }

  .tick {
    width: 2px;
    height: 12px;
    background: var(--border);
    border-radius: 1px;
  }

  .tick.major { height: 18px; background: var(--text-dim); }

  .play-controls {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: center;
  }

  .btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { background: rgba(255,255,255,0.08); }
  .btn.primary { background: #238636; border-color: #238636; }
  .btn.primary:hover { background: #2ea043; }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
  }

  .speed-btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s;
  }

  .speed-btn.active {
    background: rgba(255,255,255,0.15);
    color: var(--text);
    border-color: var(--text-dim);
  }

  .collapse-btn {
    position: absolute;
    right: 320px;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 48px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 8px 0 0 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    transition: all 0.3s;
    z-index: 10;
  }

  .collapse-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .info-panel.collapsed + .collapse-btn { right: 0; }

  .dynasty-events {
    margin-top: 12px;
  }

  .event-item {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 12px;
    display: flex;
    gap: 10px;
  }

  .event-year {
    color: var(--text-dim);
    flex-shrink: 0;
    width: 36px;
  }

  .event-desc { color: var(--text); line-height: 1.5; }

  .fade-overlay {
    position: absolute;
    pointer-events: none;
    z-index: 5;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .playing .current-year {
    animation: pulse 1.5s ease-in-out infinite;
  }
</style>
</head>

  qianShu: { path: 'M160,280 L230,270 L260,320 L240,380 L170,390 L130,340 Z', label: '成都' },
  houShu: { path: 'M150,290 L220,280 L255,330 L235,390 L160,395 L125,350 Z', label: '成都' },
  nanWu: { path: 'M420,250 L500,230 L540,300 L520,370 L440,380 L400,320 Z', label: '扬州' },
  nanTang: { path: 'M400,240 L490,220 L540,290 L525,360 L420,375 L380,310 Z', label: '金陵' },
  yueYue: { path: 'M450,350 L520,330 L560,400 L530,450 L460,440 L430,390 Z', label: '杭州' },
  minGuo: { path: 'M490,370 L560,350 L590,420 L560,470 L500,455 L470,410 Z', label: '福州' },
  nanChu: { path: 'M340,330 L410,310 L450,370 L430,430 L360,440 L320,390 Z', label: '长沙' },
  nanHan: { path: 'M480,470 L580,450 L650,520 L620,580 L510,570 L460,520 Z', label: '广州' },
  beiHan: { path: 'M200,120 L280,110 L320,150 L300,200 L230,210 L190,160 Z', label: '太原' },
  nanPing: { path: 'M380,290 L440,275 L470,320 L450,370 L400,375 L365,335 Z', label: '江陵' }
};

// ============ STATE ============
let currentYear = 907;
let isPlaying = false;
let playInterval = null;
let playSpeed = 1;
let activeFilters = new Set(Object.keys(DYNASTIES));

// ============ DOM ELEMENTS ============
const svg = document.getElementById('map');
const tooltip = document.getElementById('tooltip');
const timelineInput = document.getElementById('timelineInput');
const timelineProgress = document.getElementById('timelineProgress');
const timelineThumb = document.getElementById('timelineThumb');
const currentYearEl = document.getElementById('currentYear');
const currentEraEl = document.getElementById('currentEra');
const wuDaiRulersEl = document.getElementById('wuDaiRulers');
const shiGuoRulersEl = document.getElementById('shiGuoRulers');
const dynastyEventsEl = document.getElementById('dynastyEvents');
const infoPanel = document.getElementById('infoPanel');
const collapseBtn = document.getElementById('collapseBtn');
const legend = document.getElementById('legend');

// ============ RENDER FUNCTIONS ============
function renderLegend() {
  const order = ['houLiang','houTang','houJin','houHan','houZhou','qianShu','houShu','nanWu','nanTang','yueYue','minGuo','nanChu','nanHan','beiHan','nanPing'];
  legend.innerHTML = order.map(id => {
    const d = DYNASTIES[id];
    const isActive = activeFilters.has(id);
    return `<div class="legend-item ${isActive ? '' : 'inactive'}" data-id="${id}" onclick="toggleDynasty('${id}')">
      <div class="legend-dot" style="background:${d.color}"></div>
      <span>${d.name}</span>
    </div>`;
  }).join('');
}

function toggleDynasty(id) {
  if (activeFilters.has(id)) {
    activeFilters.delete(id);
  } else {
    activeFilters.add(id);
  }
  renderLegend();
  renderMap();
  updateRulers();
  updateRegionOpacity();
}

function renderMap() {
  // Clear existing
  svg.innerHTML = '';
  
  // Background
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width', '100%');
  bg.setAttribute('height', '100%');
  bg.setAttribute('fill', '#1a1f26');
  svg.appendChild(bg);
  
  // Grid lines (subtle)
  const grid = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  grid.setAttribute('stroke', '#252b33');
  grid.setAttribute('stroke-width', '0.5');
  for (let i = 0; i < 800; i += 40) {
    const vLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    vLine.setAttribute('x1', i); vLine.setAttribute('y1', 0);
    vLine.setAttribute('x2', i); vLine.setAttribute('y2', 600);
    grid.appendChild(vLine);
  }
  for (let i = 0; i < 600; i += 40) {
    const hLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    hLine.setAttribute('x1', 0); hLine.setAttribute('y1', i);
    hLine.setAttribute('x2', 800); hLine.setAttribute('y2', i);
    grid.appendChild(hLine);
  }
  svg.appendChild(grid);
  
  // Regions
  const regionsGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  regionsGroup.setAttribute('id', 'regions');
  
  Object.entries(REGIONS).forEach(([id, data]) => {
    const dynasty = DYNASTIES[id];
    if (!dynasty) return;
    
    // Check if this dynasty exists in current year
    const isActive = currentYear >= dynasty.start && currentYear <= dynasty.end;
    const isFiltered = activeFilters.has(id);
    
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', data.path);
    path.setAttribute('fill', dynasty.color);
    path.setAttribute('stroke', '#fff');
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('stroke-opacity', '0.3');
    path.setAttribute('class', `region ${isActive && isFiltered ? '' : 'inactive'}`);
    path.setAttribute('data-id', id);
    path.style.opacity = isActive ? '0.75' : '0.1';
    
    // Animation
    if (isActive) {
      path.style.transition = 'opacity 0.5s, filter 0.3s';
    }
    
    // Hover effects
    path.addEventListener    
    path.addEventListener('mouseenter', (e) => {
      showTooltip(e, id);
    });
    path.addEventListener('mousemove', (e) => {
      moveTooltip(e);
    });
    path.addEventListener('mouseleave', () => {
      hideTooltip();
    });
    path.addEventListener('click', () => {
      scrollToDynasty(id);
    });
    
    regionsGroup.appendChild(path);
    
    // Label
    if (isActive) {
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('class', 'region-label');
      label.setAttribute('x', getCentroid(data.path).x);
      label.setAttribute('y', getCentroid(data.path).y);
      label.textContent = dynasty.name;
      label.style.opacity = '0';
      label.style.transition = 'opacity 0.5s 0.3s';
      regionsGroup.appendChild(label);
      
      // Fade in label after a delay
      requestAnimationFrame(() => {
        label.style.opacity = '1';
      });
    }
  });
  
  svg.appendChild(regionsGroup);
  
  // Title
  const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  title.setAttribute('x', '20');
  title.setAttribute('y', '35');
  title.setAttribute('fill', '#8b949e');
  title.setAttribute('font-size', '12');
  title.setAttribute('font-family', 'var(--font)');
  title.textContent = '五代十国时期疆域变迁示意';
  svg.appendChild(title);
}

function getCentroid(pathD) {
  // Simplified centroid calculation for path
  const nums = pathD.match(/\d+/g).map(Number);
  let sumX = 0, sumY = 0;
  for (let i = 0; i < nums.length; i += 2) {
    sumX += nums[i];
    sumY += nums[i+1];
  }
  return { x: sumX / (nums.length/2), y: sumY / (nums.length/2) };
}

function showTooltip(e, id) {
  const d = DYNASTIES[id];
  if (!d) return;
  
  const isActive = currentYear >= d.start && currentYear <= d.end;
  
  let rulerHtml = '';
  if (isActive) {
    const ruler = getCurrentRuler(d, currentYear);
    if (ruler) {
      rulerHtml = `<div class="tooltip-row"><span>在位</span><span>${ruler.name} (${ruler.reign})</span></div>`;
    }
  }
  
  tooltip.innerHTML = `
    <h3>
      <span class="dynasty-name" style="background:${d.color}">${d.name}</span>
    </h3>
    ${isActive ? `
      <div class="tooltip-row"><span>存续</span><span>${d.start}-${d.end}</span></div>
      <div class="tooltip-row"><span>统治</span><span>${d.territory}</span></div>
      <div class="tooltip-row"><span>民族</span><span>${d.ethnic}</span></div>
      <div class="tooltip-row"><span>亡于</span><span>${d.collapsed}</span></div>
      ${rulerHtml}
    ` : `
      <div class="tooltip-row"><span>状态</span><span>${currentYear < d.start ? '尚未建立' : '已经灭亡'}</span></div>
    `}
  `;
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const x = e.clientX + 15;
  const y = e.clientY + 15;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

function getCurrentRuler(dynasty, year) {
  return dynasty.founders.find((r, i) => {
    const reigns = r.reign.split('-');
    const start = parseInt(reigns[0]);
    const end = reigns[1] ? parseInt(reigns[1]) : year;
    return year >= start && year <= end;
  });
}

function scrollToDynasty(id) {
  const d = DYNASTIES[id];
  if (!d) return;
  
  // Check if dynasty exists in current year
  if (currentYear < d.start || currentYear > d.end) {
    // Jump to dynasty start year
    setYear(d.start);
    timelineInput.value = d.start;
  }
  
  // Expand panel if collapsed
  infoPanel.classList.remove('collapsed');
  collapseBtn.textContent = '‹';
  
  // Scroll to relevant section
  const isWuDai = ['houLiang','houTang','houJin','houHan','houZhou'].includes(id);
  const target = isWuDai ? wuDaiRulersEl : shiGuoRulersEl;
  if (target) {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  
  // Highlight ruler
  highlightRuler(id);
}

function highlightRuler(id) {
  document.querySelectorAll('.ruler-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
}

function updateRulers() {
  // Five Dynasties
  wuDaiRulersEl.innerHTML = ['houLiang','houTang','houJin','houHan','houZhou'].map(id => {
    return renderRulerItem(id, DYNASTIES[id]);
  }).join('');
  
  // Ten Kingdoms
  shiGuoRulersEl.innerHTML = ['qianShu','houShu','nanWu','nanTang','yueYue','minGuo','nanChu','nanHan','beiHan','nanPing'].map(id => {
    return renderRulerItem(id, DYNASTIES[id]);
  }).join('');
  
  // Add click handlers
  document.querySelectorAll('.ruler-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      if (id) scrollToDynasty(id);
    });
  });
}

function renderRulerItem(id, dynasty) {
  if (!dynasty) return '';
  
  const isActive = currentYear >= dynasty.start && currentYear <= dynasty.end;
  const ruler = isActive ? getCurrentRuler(dynasty, currentYear) : null;
  
  return `
    <div class="ruler-item ${isActive ? 'active' : ''}" data-id="${id}">
      <div class="ruler-avatar" style="background:${dynasty.color}20; color:${dynasty.color}; border: 2px solid ${dynasty.color}">
        ${ruler ? ruler.name[0] : (currentYear < dynasty.start ? '?' : '✕')}
      </div>
      <div class="ruler-info">
        <div class="ruler-name" style="color: ${isActive ? dynasty.color : 'var(--text-dim)'}">
          ${dynasty.name}
          ${currentYear < dynasty.start ? `<span style="font-size:11px;color:var(--text-dim)">(${dynasty.start}年建)</span>` : ''}
          ${currentYear > dynasty.end ? `<span style="font-size:11px;color:var(--text-dim)">(已亡)</span>` : ''}
        </div>
        <div class="ruler-reign">
          ${ruler ? `${ruler.name} · ${ruler.reign}` : `${dynasty.start}-${dynasty.end}`}
        </div>
      </div>
    </div>
  `;
}

function updateRegionOpacity() {
  document.querySelectorAll('.region').forEach(path => {
    const id = path.getAttribute('data-id');
    const d = DYNASTIES[id];
    if (!d) return;
    
    const isActive = currentYear >= d.start && currentYear <= d.end;
    const isFiltered = activeFilters.has(id);
    
    path.classList.toggle('inactive', !isActive || !isFiltered);
    path.style.opacity = isActive && isFiltered ? '0.75' : '0.1';
  });
}

function updateEvents() {
  const relevantEvents = EVENTS.filter(e => e.year === currentYear);
  
  if (relevantEvents.length > 0) {
    dynastyEventsEl.innerHTML = relevantEvents.map(e => `
      <div class="event-item">
        <span class="event-year">${e.year}</span>
        <span class="event-desc">${e.text}</span>
      </div>
    `).join('');
  } else {
    // Show upcoming events
    const upcoming = EVENTS.filter(e => e.year > currentYear).slice(0, 3);
    dynastyEventsEl.innerHTML = upcoming.map(e => `
      <div class="event-item" style="opacity:0.5">
        <span class="event-year">${e.year}</span>
        <span class="event-desc">${e.text}</span>
      </div>
    `).join('');
    if (upcoming.length === 0) {
      dynastyEventsEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px">五代入宋，天下渐归一统</div>';
    }
  }
}

function updateEraLabel() {
  // Find what's happening at current year
  const activeDynasties = Object.entries(DYNASTIES).filter(([id, d]) => 
    currentYear >= d.start && currentYear <= d.end
  );
  
  // Find events
  const yearEvents = EVENTS.filter(e => e.year === currentYear);
  
  if (yearEvents.length > 0) {
    currentEraEl.textContent = yearEvents[0].text.slice(0, 20);
  } else if (activeDynasties.length > 0) {
    const mainDynasty = activeDynasties.find(([id]) => 
      ['houLiang','houTang','houJin','houHan','houZhou'].includes(id)
    );
    if (mainDynasty) {
      const ruler = getCurrentRuler(mainDynasty[1], currentYear);
      currentEraEl.textContent = ruler ? `${mainDynasty[1].name} · ${ruler.era}年` : mainDynasty[1].name;
    } else {
      currentEraEl.textContent = `${activeDynasties.length}个政权并存`;
    }
  }
}

function setYear(year) {
  currentYear = parseInt(year);
  currentYearEl.textContent = currentYear;
  
  // Update timeline
  const progress = ((currentYear - 907) / (979 - 907)) * 100;
  timelineProgress.style.width = progress + '%';
  timelineThumb.style.left = progress + '%';
  
  updateEraLabel();
  updateRulers();
  updateRegionOpacity();
  updateEvents();
}

// ============ PLAYBACK ============
function play() {
  if (isPlaying) {
    pause();
    return;
  }
  
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ 暂停';
  document.body.classList.add('playing');
  
  const interval = 1000 / playSpeed;
  
  playInterval = setInterval(() => {
    if (currentYear >= 979) {
      pause();
      setYear(907);
      return;
    }
    setYear(currentYear + 1);
    timelineInput.value = currentYear;
  }, interval);
}

function pause() {
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶ 播放';
  document.body.classList.remove('playing');
  if (playInterval) {
    clearInterval(playInterval);
    playInterval = null;
  }
}

function reset() {
  pause();
  setYear(907);
  timelineInput.value = 907;
}

// ============ EVENT LISTENERS ============
document.getElementById('playBtn').addEventListener('click', play);
document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentYear > 907) setYear(currentYear - 1);
  timelineInput.value = currentYear;
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentYear < 979) setYear(currentYear + 1);
  timelineInput.value = currentYear;
});
document.getElementById('resetBtn').addEventListener('click', reset);

timelineInput.addEventListener('input', (e) => {
  setYear(e.target.value);
});

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    playSpeed = parseFloat(btn.dataset.speed);
    if (isPlaying) {
      pause();
      play();
    }
  });
});

collapseBtn.addEventListener('click', () => {
  infoPanel.classList.toggle('collapsed');
  collapseBtn.textContent = infoPanel.classList.contains('collapsed') ? '‹' : '›';
});

// Keyboard controls
document.addEventListener('keydown', (e) => {
  switch(e.key) {
    case ' ':
      e.preventDefault();
      play();
      break;
    case 'ArrowLeft':
      if (currentYear > 907) setYear(currentYear - 1);
      timelineInput.value = currentYear;
      break;
    case 'ArrowRight':
      if (currentYear < 979) setYear(currentYear + 1);
      timelineInput.value = currentYear;
      break;
    case 'Home':
      setYear(907);
      timelineInput.value = 907;
      break;
    case 'End':
      setYear(979);
      timelineInput.value = 979;
      break;
  }
});

// ============ INIT ============
renderLegend();
renderMap();
setYear(907);
updateRulers();
updateEvents();

// Entrance animation
document.querySelectorAll('.region').forEach((el, i) => {
  el.style.opacity = '0';
  el.style.transform = 'scale(0.9)';
  setTimeout(() => {
    el.style.opacity = el.classList.contains('inactive') ? '0.1' : '0.75';
    el.style.transform = 'scale(1)';
  }, 100 + i * 30);
});
</script>
</body>
</html>
